<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Profiler</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header>
    <div class="header-brand">
      <div class="sigil">▸</div>
      <h1><span>API</span> Profiler</h1>
    </div>
    <div class="header-right">
      <span class="header-meta" id="header-host"></span>
      <span id="alert-badge"></span>
    </div>
  </header>

  <div class="timerange-bar" id="timerange-bar">
    <div class="timerange-inner">
      <span class="timerange-label">Range</span>
      <div class="tr-presets">
        <button class="tr-btn tr-preset" data-preset="15m">15m</button>
        <button class="tr-btn tr-preset" data-preset="1h">1h</button>
        <button class="tr-btn tr-preset" data-preset="6h">6h</button>
        <button class="tr-btn tr-preset" data-preset="24h">24h</button>
        <button class="tr-btn tr-preset" data-preset="7d">7d</button>
      </div>
      <span class="timerange-sep tr-sep-custom">|</span>
      <div class="timerange-inputs">
        <input type="datetime-local" id="tr-from" class="tr-input" title="From">
        <span class="timerange-sep">→</span>
        <input type="datetime-local" id="tr-to" class="tr-input" title="To (leave empty for now)">
      </div>
      <button class="tr-btn tr-apply" id="tr-apply">Apply</button>
      <button class="tr-btn tr-live active" id="tr-live">⬤ Live</button>
    </div>
  </div>

  <main>

    <section id="heatmap">
      <div class="section-header">
        <span class="section-title"><span class="dot"></span>Traffic Heatmap</span>
        <div class="panel-tabs" id="heatmap-tabs">
          <button class="panel-tab active" data-metric="rps">RPS</button>
          <button class="panel-tab" data-metric="error_rate">Error Rate</button>
        </div>
      </div>
      <div class="section-body">
        <div class="placeholder">loading heatmap…</div>
      </div>
    </section>

    <section id="summary">
      <div class="section-header">
        <span class="section-title"><span class="dot"></span>Overview</span>
      </div>
      <div class="section-body">
        <div class="placeholder">loading summary…</div>
      </div>
    </section>

    <section id="status-breakdown">
      <div class="section-header">
        <span class="section-title"><span class="dot"></span>Status</span>
      </div>
      <div class="section-body">
        <div class="placeholder">loading status…</div>
      </div>
    </section>

    <section id="error-fingerprints">
      <div class="section-header">
        <span class="section-title"><span class="dot dot-warn"></span>Error Fingerprints</span>
      </div>
      <div class="section-body">
        <div class="placeholder">loading error fingerprints…</div>
      </div>
    </section>

    <section id="alert-history" style="display:none">
      <div class="section-header">
        <span class="section-title"><span class="dot dot-warn"></span>Alert History</span>
        <div class="panel-tabs" id="ah-kind-tabs"></div>
      </div>
      <div class="section-body"></div>
    </section>

    <section id="alerts" style="display:none">
      <div class="section-header">
        <span class="section-title"><span class="dot dot-danger"></span>Active Alerts</span>
      </div>
      <div class="section-body"></div>
    </section>

    <section id="endpoints">
      <div class="section-header">
        <span class="section-title"><span class="dot"></span>Endpoints</span>
      </div>
      <div class="section-body">
        <div class="placeholder">loading endpoints…</div>
      </div>
    </section>

    <section id="requests-section">
      <div class="section-header">
        <span class="section-title"><span class="dot"></span>Requests</span>
        <div class="panel-tabs" id="requests-tabs">
          <button class="panel-tab active" data-tab="log">Log</button>
          <button class="panel-tab" data-tab="slowest">Slowest</button>
        </div>
      </div>
      <div id="requests-tab-log">
        <div class="placeholder">loading request log…</div>
      </div>
      <div id="requests-tab-slowest" style="display:none">
        <div class="placeholder">loading slowest requests…</div>
      </div>
    </section>

  </main>

  <div class="statusbar">
    <div class="statusbar-item">
      <span class="indicator"></span>
      <span>connected</span>
    </div>
    <span id="upstream-health" style="display:none"></span>
    <span>poll · 5s</span>
    <span id="last-updated"></span>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
