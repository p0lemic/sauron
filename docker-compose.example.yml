# ── Sauron integration example ────────────────────────────────────────────────
#
# Drop these two services into your project's docker-compose.yml.
# Traffic flow: client → sauron-proxy:8080 → your-app:3000
# Dashboard:    http://localhost:9090
#
# Steps:
#   1. Copy the `sauron-proxy`, `sauron-dashboard` services and the
#      `sauron-data` volume into your docker-compose.yml.
#   2. Point PROFILER_UPSTREAM at your app's internal service name.
#   3. Send traffic to sauron-proxy instead of your app directly.

services:

  # Your existing app — unchanged.
  app:
    build: .
    ports:
      - "3000:3000"

  # ── Sauron ──────────────────────────────────────────────────────────────────

  sauron-proxy:
    image: ghcr.io/your-org/sauron:latest   # or `build: ./sauron`
    command: ["./profiler"]
    environment:
      PROFILER_UPSTREAM:    "http://app:3000"   # internal service name
      PROFILER_PORT:        "8080"
      PROFILER_STORAGE_DSN: "/data/profiler.db"
    ports:
      - "8080:8080"   # clients hit this instead of app:3000
    volumes:
      - sauron-data:/data
    depends_on:
      - app
    restart: unless-stopped

  sauron-dashboard:
    image: ghcr.io/your-org/sauron:latest   # or `build: ./sauron`
    command: ["./dashboard"]
    environment:
      PROFILER_STORAGE_DSN: "/data/profiler.db"
      PROFILER_API_ADDR:    ":9090"
    ports:
      - "9090:9090"
    volumes:
      - sauron-data:/data
    depends_on:
      - sauron-proxy
    restart: unless-stopped

volumes:
  sauron-data:
