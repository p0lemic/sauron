# nginx reverse proxy with automatic fallback to upstream when Sauron is unavailable.
#
# Traffic flow (normal):  client → nginx:80 → sauron-proxy:8080 → upstream
# Traffic flow (fallback): client → nginx:80 → upstream:${UPSTREAM_PORT} (when Sauron returns 502/503/504)
#
# The upstream app address is injected at runtime via envsubst:
#   UPSTREAM_HOST  — internal hostname of the app (e.g. "nginx")
#   UPSTREAM_PORT  — port the app listens on (e.g. "80")

upstream sauron_proxy {
    server sauron-proxy:8080;
    keepalive 32;
}

server {
    listen 80;

    # Forward all requests to Sauron first.
    location / {
        proxy_pass              http://sauron_proxy;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_connect_timeout   2s;
        proxy_read_timeout      30s;
        proxy_send_timeout      30s;

        # Intercept Sauron errors and fall back to the upstream directly.
        proxy_intercept_errors  on;
        error_page 502 503 504  = @direct;
    }

    # Fallback: bypass Sauron and hit the upstream app directly.
    # Traffic still flows; only observability is lost.
    location @direct {
        proxy_pass              http://${UPSTREAM_HOST}:${UPSTREAM_PORT};
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
}
