# Sauron — Docker Compose override for Symfony (nginx + php-fpm)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.sauron.yml up
#
# Or rename to docker-compose.override.yml for automatic pickup:
#   cp docker-compose.sauron.yml docker-compose.override.yml
#
# Assumes your existing nginx service is named "nginx" and listens on port 80.
# Set NGINX_SERVICE to override the service name (e.g. NGINX_SERVICE=webserver).

services:

  # Override: removes the host port from your existing nginx.
  # Sauron's nginx takes over port 80; your nginx stays reachable internally.
  nginx:
    ports: []

  sauron-nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./sauron/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      UPSTREAM_HOST: "${NGINX_SERVICE:-nginx}"
      UPSTREAM_PORT: "80"
    depends_on:
      - sauron-proxy
      - nginx
    restart: always

  sauron-proxy:
    image: ghcr.io/your-org/sauron:latest
    command: ["./profiler"]
    environment:
      PROFILER_UPSTREAM:    "http://${NGINX_SERVICE:-nginx}:80"
      PROFILER_PORT:        "8080"
      PROFILER_STORAGE_DSN: "/data/profiler.db"
    expose:
      - "8080"
    volumes:
      - sauron-data:/data
    depends_on:
      - nginx
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_sauron/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  sauron-dashboard:
    image: ghcr.io/your-org/sauron:latest
    command: ["./dashboard"]
    environment:
      PROFILER_STORAGE_DSN: "/data/profiler.db"
      PROFILER_API_ADDR:    ":9090"
    ports:
      - "${DASHBOARD_PORT:-9090}:9090"
    volumes:
      - sauron-data:/data
    depends_on:
      - sauron-proxy
    restart: always

volumes:
  sauron-data:
